<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C87050"/>
      <stop offset="100%" stop-color="#B85A3A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="500" r="300" fill="rgba(255,255,255,0.02)"/>
  <circle cx="150" cy="600" r="150" fill="rgba(255,255,255,0.02)"/>

  <!-- "M" Logo badge -->
  <circle cx="600" cy="140" r="48" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="158" font-family="DM Serif Display, Georgia, serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" font-style="italic">M</text>

  <!-- Name -->
  <text x="600" y="245" font-family="DM Serif Display, Georgia, serif" font-size="72" font-weight="400" fill="white" text-anchor="middle">Max Guo</text>

  <!-- Tagline -->
  <text x="600" y="310" font-family="Inter, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)" text-anchor="middle">LLM Calibration &amp; Trust in AI Coaching</text>

  <!-- Divider line -->
  <line x1="400" y1="360" x2="800" y2="360" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Domain -->
  <text x="600" y="400" font-family="JetBrains Mono, monospace" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle">maxguo.dev</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#2D7D6A" opacity="0.15"/>
  <text x="600" y="605" font-family="Inter, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">RESEARCH · HCI · AI SAFETY</text>
</svg>
